<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: rgb(107, 217, 193);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Iniciando atividades com DOM</h1>
    <p>Aprendendo o uso do <strong>DOM</strong> em JS</p>
    <p>Resuldado</p>
    <div>Click em mim</div>
    <script>
        var p1 = window.document.getElementsByTagName('p')[1]
        window.document.write('esta escrito assim: ' + p1.innerText)
        p1.style.color = 'red'
    </script>
</body>
</html>
